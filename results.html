<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>Your Results | Kat Anselmo</title>
    <link rel="stylesheet" href="97c6fd0b3a56e5fc.css">
    <style>
        .result-box { max-width: 800px; margin: 100px auto; padding: 40px; background: #fff; color: #000; border-top: 10px solid #E31C23; }
        .cta-footer { background: #000; color: #fff; padding: 60px; text-align: center; }
    </style>
</head>
<body class="bg-gray-100">

    <div class="result-box">
        <div id="dynamic-content">
            </div>
    </div>

    <div class="cta-footer">
        <h2 class="text-4xl font-black uppercase mb-4">Go Further with Kat</h2>
        <p class="text-xl text-gray-400 mb-8">Schedule your 45-minute One-to-One Breakthrough Consultation</p>
        <div class="text-5xl font-black text-red-600 mb-10">€99.00</div>
        <a href="https://your-payment-link.com" class="bg-red-600 px-12 py-5 font-black text-2xl uppercase inline-block">Book My Session</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const p = params.get('profile');
        const user = params.get('user') || "Friend";
        const target = document.getElementById('dynamic-content');

        const data = {
            "1": { title: "THE OVERTHINKER", body: "Your mind works hard to protect you. You spend time analyzing possibilities, creating doubt instead of clarity..." },
            "2": { title: "THE PEOPLE PLEASER", body: "You care deeply about others, often putting their comfort before your own needs..." },
            "3": { title: "THE DISCONNECTED DREAMER", body: "Your vision is high, but you lack the grounded action to make it real..." },
            "4": { title: "THE UNCERTAIN NAVIGATOR", body: "You are at a crossroads. It's time to listen to your inner guidance..." }
        };

        const res = data[p] || data["1"];
        target.innerHTML = `<h1 class="text-4xl font-black mb-6">🟣 RESULT: ${res.title}</h1><p class="text-xl leading-relaxed">${user}, ${res.body}</p>`;
    </script>
</body>
</html>
